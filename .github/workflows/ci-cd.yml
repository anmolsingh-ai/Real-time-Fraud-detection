name: Fraud Detection CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest
    outputs:
      models_artifact: models-artifact

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Pull DVC Data
        run: dvc pull

      - name: Run Feature Engineering
        run: python src/features/feature_engineering.py

      - name: Run Preprocessing Pipeline
        run: python src/data/preprocess.py

      - name: Train XGBoost Model
        run: python src/models/train.py

      - name: Run Anomaly Detection
        run: python src/models/anomly_detection.py

      - name: Upload Models Artifact
        uses: actions/upload-artifact@v4
        with:
          name: models-artifact
          path: models/

  build-and-deploy:
    needs: train
    runs-on: ubuntu-latest

    env:
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REGISTRY_REGION: ap-south-1
      IMAGE_NAME: fraud-detection-api
      IMAGE_TAG: latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Models Artifact
        uses: actions/download-artifact@v4
        with:
          name: models-artifact
          path: models/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "⚠️  WARNING: DOCKER_USERNAME secret is not set"
          fi
          if [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "❌ ERROR: AWS_ACCOUNT_ID secret is not set"
            exit 1
          fi
          echo "✅ Secrets validation passed"

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          echo "✅ Docker image built successfully"

      - name: Push to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        run: |
          DOCKER_HUB_IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $DOCKER_HUB_IMAGE
          docker push $DOCKER_HUB_IMAGE
          echo "✅ Successfully pushed to Docker Hub: $DOCKER_HUB_IMAGE"

      - name: Push to Amazon ECR
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.ECR_REGISTRY_REGION }}.amazonaws.com"
          ECR_IMAGE="$ECR_REGISTRY/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $ECR_IMAGE
          docker push $ECR_IMAGE
          echo "✅ Successfully pushed to Amazon ECR: $ECR_IMAGE"

      - name: Display Summary
        run: |
          echo "================================================"
          echo "🎉 CI/CD Pipeline Completed Successfully!"
          echo "================================================"
          echo "Image Name: ${{ env.IMAGE_NAME }}"
          echo "Image Tag: ${{ env.IMAGE_TAG }}"
          echo "AWS Region: ${{ env.ECR_REGISTRY_REGION }}"
          echo "================================================"